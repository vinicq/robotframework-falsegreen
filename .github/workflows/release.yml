name: release

# Builds the package and publishes it to PyPI via Trusted Publishing (OIDC).
# No API token: the publish job exchanges a short-lived OIDC identity with PyPI.
# Fires on a published GitHub release, or manually for an existing tag.
#
# One-time setup (see RELEASE notes): on PyPI add a Trusted Publisher for project
# `robotframework-falsegreen` (owner vinicq, repo robotframework-falsegreen, workflow release.yml,
# environment pypi); create a GitHub environment named `pypi`.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    # Fail the release before publishing if the tag, pyproject, scanner __version__,
    # CITATION, and the CHANGELOG disagree. An OIDC publish of a mismatched version is
    # unrecoverable (#95).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Version parity (tag == pyproject == __version__ == CITATION == CHANGELOG)
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          dunder=$(grep -m1 '__version__' src/falsegreen_robot/scanner.py | cut -d'"' -f2)
          cff=$(grep -m1 '^version:' CITATION.cff | cut -d' ' -f2)
          fail=0
          for pair in "pyproject:$manifest" "__version__:$dunder" "CITATION:$cff"; do
            name="${pair%%:*}"; val="${pair#*:}"
            [ "$tag" = "$val" ] || { echo "::error::tag ${GITHUB_REF_NAME} != ${name} ${val}"; fail=1; }
          done
          grep -qF "## [$manifest]" CHANGELOG.md || { echo "::error::CHANGELOG.md has no section for $manifest"; fail=1; }
          [ "$fail" = 0 ] && echo "version parity OK: $manifest"
          exit $fail

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
